.nc-close{background:none;border:none;color:#fff;cursor:pointer;font-size:1.2rem;padding:0;line-height:1}
.nc-new-chat{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;font-size:.65rem;font-weight:600;padding:4px 10px;border-radius:6px;line-height:1;transition:background .2s}
.nc-new-chat:hover{background:rgba(255,255,255,.25)}
.nc-player-ctx{background:#1e293b;color:#94a3b8;padding:8px 20px;font-size:.7rem;display:none;flex-shrink:0}
.nc-player-ctx.active{display:block}
.nc-messages{flex:1;overflow-y:auto;padding:16px 16px 12px;display:flex;flex-direction:column;gap:4px;min-height:240px;max-height:480px;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent}
.nc-messages::-webkit-scrollbar{width:4px}
.nc-messages::-webkit-scrollbar-track{background:transparent}
.nc-messages::-webkit-scrollbar-thumb{background-color:#cbd5e1;border-radius:10px}
.nc-messages::-webkit-scrollbar-thumb:hover{background-color:#94a3b8}
.nc-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:.85rem;line-height:1.5;word-wrap:break-word;overflow-wrap:break-word;animation:ncMsgIn .22s cubic-bezier(.16,1,.3,1) both}
.nc-msg.nc-turn-start{margin-top:10px}
.nc-msg.user{background:#2563eb;color:#fff;align-self:flex-end;border-bottom-right-radius:4px;box-shadow:0 1px 2px rgba(37,99,235,.25)}
.nc-msg.assistant{background:#f1f5f9;color:#1e293b;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
@keyframes ncMsgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nc-msg p{margin:0 0 8px}
.nc-msg p:last-child{margin:0}
.nc-msg ul,.nc-msg ol{margin:4px 0;padding-left:20px}
.nc-msg strong{font-weight:600}
.nc-video{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-top:8px}
.nc-video-title{font-size:.75rem;font-weight:600;margin-bottom:6px;color:#374151}
.nc-video iframe{width:100%;height:180px;border:none;border-radius:6px}
.nc-input-area{border-top:1px solid #e5e7eb;padding:10px 14px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:#fff}
.nc-input-area textarea{flex:1;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:.85rem;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s ease,box-shadow .15s ease;color:#1e293b;background:#fafafa;resize:none;min-height:40px;max-height:120px;line-height:1.45;overflow-y:auto}
.nc-input-area textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);background:#fff}
.nc-input-area textarea::placeholder{color:#9ca3af;font-size:.8rem}
.nc-input-area button{background:#000;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s ease,transform .1s ease;margin-bottom:1px}
.nc-input-area button:hover:not(:disabled){background:#1a1a1a}
.nc-input-area button:active:not(:disabled){transform:scale(0.97)}
.nc-input-area button:disabled{opacity:.45;cursor:not-allowed}
.nc-typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.nc-typing span{width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:ncBounce .6s infinite alternate}
.nc-typing span:nth-child(2){animation-delay:.2s}
.nc-typing span:nth-child(3){animation-delay:.4s}
@keyframes ncBounce{to{transform:translateY(-6px);opacity:.3}}
.nc-viz{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-top:8px;align-self:flex-start;width:calc(100% - 20px);max-width:340px;box-sizing:border-box;box-shadow:0 1px 4px rgba(0,0,0,.05);animation:ncMsgIn .28s cubic-bezier(.16,1,.3,1) both}
.nc-viz-title{font-size:.68rem;font-weight:700;color:#64748b;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f1f5f9;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.nc-viz-expand-btn{background:none;border:none;cursor:pointer;color:#94a3b8;padding:2px;line-height:1;border-radius:4px;transition:color .15s,background .15s}
.nc-viz-expand-btn:hover{color:#2563eb;background:#f1f5f9}
.nc-viz-expand-btn svg{display:block}
.nc-viz-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:3100;display:flex;align-items:center;justify-content:center;opacity:0;animation:ncFadeIn .2s ease forwards}
.nc-viz-modal-content{background:#fff;border-radius:14px;padding:24px;max-width:720px;width:calc(100vw - 48px);max-height:calc(100vh - 80px);overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:ncMsgIn .25s cubic-bezier(.16,1,.3,1) both}
.nc-viz-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e2e8f0}
.nc-viz-modal-header .nc-viz-title{margin-bottom:0;padding-bottom:0;border-bottom:none;font-size:.8rem}
.nc-viz-modal-close{background:none;border:none;cursor:pointer;color:#64748b;padding:4px;border-radius:6px;transition:color .15s,background .15s}
.nc-viz-modal-close:hover{color:#1e293b;background:#f1f5f9}
.nc-viz-modal-body .nc-viz-svg{max-width:100%}
.nc-viz-modal-body .nc-viz-table{font-size:.8rem}
.nc-viz-modal-body .nc-viz-table th,.nc-viz-modal-body .nc-viz-table td{padding:6px 12px;font-size:.78rem}
.nc-viz-modal-body .nc-viz-bar-label{font-size:13px}
.nc-viz-modal-body .nc-viz-bar-value{font-size:12px}
.nc-viz-modal-body .nc-viz-radar-label{font-size:12px}
.nc-viz-modal-body .nc-viz-trend-val{font-size:12px}
.nc-viz-modal-body .nc-viz-trend-label{font-size:11px}
@keyframes ncFadeIn{from{opacity:0}to{opacity:1}}
.nc-viz-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px}
.nc-viz-table{font-size:.68rem;width:100%;border-collapse:collapse;line-height:1.35}
.nc-viz-table th{background:#f8fafc;color:#64748b;font-weight:600;text-align:left;padding:3px 6px;border-bottom:2px solid #e2e8f0;white-space:nowrap;font-size:.65rem}
.nc-viz-table td{padding:3px 6px;border-bottom:1px solid #f1f5f9;white-space:nowrap;font-size:.65rem}
.nc-viz-table tr:last-child td{border-bottom:none}
.nc-viz-table .nc-viz-player-name{font-weight:600;color:#1e293b}
.nc-viz-crown-cell{position:relative}
.nc-viz-crown-icon{color:#f59e0b;font-size:.6rem;margin-left:2px}
.nc-viz-svg{display:block;width:100%;height:auto}
.nc-viz-bar-label{font-size:11px;fill:#374151;font-family:'Inter',sans-serif}
.nc-viz-bar-value{font-size:10px;fill:#64748b;font-family:'Inter',sans-serif}
.nc-viz-bar-rect{rx:3;ry:3}
.nc-viz-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.nc-viz-dot-green{background:#22c55e}
.nc-viz-dot-blue{background:#3b82f6}
.nc-viz-dot-amber{background:#f59e0b}
.nc-viz-dot-gray{background:#94a3b8}
.nc-viz-insight{font-size:.65rem;color:#475569;padding:8px 6px 2px;border-top:1px solid #e2e8f0;margin-top:4px;font-style:italic;line-height:1.4}
.nc-viz-modal-body .nc-viz-insight{font-size:.78rem;padding:12px 8px 4px}
.nc-viz-radar-grid{fill:none;stroke:#e2e8f0;stroke-width:1}
.nc-viz-radar-axis{stroke:#cbd5e1;stroke-width:.5}
.nc-viz-radar-polygon{fill:rgba(37,99,235,.15);stroke:#2563eb;stroke-width:1.5}
.nc-viz-radar-dot{fill:#2563eb}
.nc-viz-radar-label{font-size:10px;fill:#374151;font-family:'Inter',sans-serif;text-anchor:middle}
.nc-viz-trend-line{fill:none;stroke:#2563eb;stroke-width:2}
.nc-viz-trend-fill{stroke:none}
.nc-viz-trend-dot{fill:#2563eb;stroke:#fff;stroke-width:1.5}
.nc-viz-trend-val{font-size:10px;fill:#374151;font-family:'Inter',sans-serif;text-anchor:middle}
.nc-viz-trend-label{font-size:9px;fill:#94a3b8;font-family:'Inter',sans-serif;text-anchor:middle}
.nc-viz-sparkline{display:inline-block;vertical-align:middle;margin-left:4px}
#ntangible-chat-panel.nc-full .nc-viz{max-width:560px}
@media(max-width:520px){#ntangible-chat-panel{width:calc(100vw - 24px);right:12px;bottom:80px;max-height:70vh}}
</style>

<button id="ntangible-chat-bubble" onclick="window.ntangibleChat.toggle()" aria-label="Open chat">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
</button>

<div id="ntangible-chat-panel">
  <div class="nc-resize nc-resize-corner"></div>
  <div class="nc-resize nc-resize-left"></div>
  <div class="nc-resize nc-resize-top"></div>
  <div class="nc-header">
    <h3>NTangible Assistant</h3>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="nc-new-chat" onclick="window.ntangibleChat.toggleHistory()" title="History" id="nc-history-btn">History</button>
      <button class="nc-new-chat" onclick="window.ntangibleChat.newChat()" title="New Chat">New Chat</button>
      <button class="nc-mode-btn" onclick="window.ntangibleChat.toggleFull()" title="Full Screen">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <button class="nc-close" onclick="window.ntangibleChat.toggle()">&times;</button>
    </div>
  </div>
  <div class="nc-context-bar" id="nc-context-bar">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    <span class="nc-ctx-label">Seeing:</span>
    <span class="nc-ctx-text" id="nc-ctx-text">Initializing...</span>
  </div>
  <div class="nc-player-ctx" id="nc-player-ctx"></div>
  <div class="nc-history-list" id="nc-history-list"></div>
  <div class="nc-messages" id="nc-messages"></div>
  <div class="nc-input-area">
    <textarea id="nc-input" rows="1" placeholder="Ask about players, coaching, exercises..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();window.ntangibleChat.send()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
    <button id="nc-send-btn" onclick="window.ntangibleChat.send()">Send</button>
  </div>
</div>

<script>
(function() {
  const chat = {
    isOpen: false,
    sessionId: null,
    playerContext: null,
    sending: false,
    isFullScreen: false,

    _lastCtxDesc: '',

    init() {
      // Always start with a fresh session
      this.sessionId = 'sess-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      localStorage.setItem('nc-session-id', this.sessionId);
      this.initResize();
      this.syncPlayers();
      setInterval(() => this.updateContextBar(), 1000);
    },

    newChat() {
      this.sessionId = 'sess-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      localStorage.setItem('nc-session-id', this.sessionId);
      document.getElementById('nc-messages').innerHTML = '';
      document.getElementById('nc-history-list').classList.remove('active');
      const input = document.getElementById('nc-input');
      input.value = '';
      input.style.height = 'auto';
      input.focus();
    },

    async toggleHistory() {
      const list = document.getElementById('nc-history-list');
      if (list.classList.contains('active')) {
        list.classList.remove('active');
        return;
      }
      list.innerHTML = '<div class="nc-history-empty">Loading...</div>';
      list.classList.add('active');
      try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        if (!data.sessions || data.sessions.length === 0) {
          list.innerHTML = '<div class="nc-history-empty">No chat history yet</div>';
          return;
        }
        list.innerHTML = '';
        data.sessions.forEach(s => {
          const item = document.createElement('div');
          item.className = 'nc-history-item' + (s.session_id === this.sessionId ? ' current' : '');
          const preview = (s.preview || 'New chat').slice(0, 80);
          const count = Math.floor(s.message_count / 2);
          item.innerHTML = '<div class="nc-history-preview">' + this.escapeHtml(preview) + '</div>' +
            '<div class="nc-history-meta"><span>' + this.timeAgo(s.last_active) + '</span><span>' + count + ' message' + (count !== 1 ? 's' : '') + '</span></div>';
          item.onclick = () => this.switchSession(s.session_id);
          list.appendChild(item);
        });
      } catch (err) {
        list.innerHTML = '<div class="nc-history-empty">Failed to load history</div>';
      }
    },

    async switchSession(id) {
      this.sessionId = id;
      localStorage.setItem('nc-session-id', id);
      document.getElementById('nc-messages').innerHTML = '';
      document.getElementById('nc-history-list').classList.remove('active');
      await this.loadHistory();
      this.scrollToBottom();
      document.getElementById('nc-input').focus();
    },

    timeAgo(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      const diff = Math.floor((now - then) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return new Date(dateStr).toLocaleDateString();
    },

    toggle() {
      this.isOpen = !this.isOpen;
      const panel = document.getElementById('ntangible-chat-panel');
      panel.classList.toggle('open', this.isOpen);
      if (!this.isOpen) {
        // Reset to default size on close
        panel.classList.remove('nc-full');
        panel.style.width = '';
        panel.style.height = '';
        panel.style.maxHeight = '';
        const msgArea = panel.querySelector('.nc-messages');
        if (msgArea) msgArea.style.maxHeight = '';
        this.isFullScreen = false;
        document.getElementById('ntangible-chat-bubble').style.display = '';
        document.querySelector('.nc-mode-btn').classList.remove('active');
        document.getElementById('nc-history-list').classList.remove('active');
      }
      if (this.isOpen) {
        // Start a fresh chat on each open
        this.newChat();
        document.getElementById('nc-input').focus();
        this.scrollToBottom();
      }
    },

    toggleFull() {
      const panel = document.getElementById('ntangible-chat-panel');
      const bubble = document.getElementById('ntangible-chat-bubble');
      const btn = document.querySelector('.nc-mode-btn');
      this.isFullScreen = !this.isFullScreen;
      if (this.isFullScreen) {
        panel.style.width = '';
        panel.style.height = '';
        panel.style.maxHeight = '';
        panel.classList.add('nc-full');
        bubble.style.display = 'none';
        if (btn) btn.classList.add('active');
      } else {
        panel.classList.remove('nc-full');
        bubble.style.display = '';
        if (btn) btn.classList.remove('active');
      }
      this.scrollToBottom();
    },

    getViewContext() {
      if (typeof state === 'undefined') return null;
      const viewNames = { home: 'Roster Overview', alignment: 'Alignment Matrix', nterpret: 'NTerpret Profiles', training: 'Development Plan', recruiting: 'Recruiting Board' };
      const ctx = { view: state.view, viewLabel: viewNames[state.view] || state.view, filters: {}, selectedPlayer: null, modalTab: null, description: '' };
      const parts = [ctx.viewLabel];

      // Player type tab
      if (state.view === 'home' && state.ui.homeTab) parts.push(state.ui.homeTab);
      else if (state.view === 'alignment' && state.ui.alignmentTab) parts.push(state.ui.alignmentTab);
      else if (state.view === 'nterpret' && state.ui.nterpretPlayerType) parts.push(state.ui.nterpretPlayerType);

      // Filters
      if (state.filters) {
        ctx.filters = { ...state.filters };
        if (state.filters.testingRound && state.filters.testingRound !== 'All') parts.push(state.filters.testingRound);
        if (state.filters.position && state.filters.position !== 'All') parts.push(state.filters.position);
        if (state.filters.cohort && state.filters.cohort !== 'All') parts.push(state.filters.cohort);
        if (state.filters.alignmentTier && state.filters.alignmentTier !== 'All') parts.push(state.filters.alignmentTier);
      }

      // Recruiting-specific
      if (state.view === 'recruiting') {
        if (state.ui.recruitingView === 'archived') parts.push('Archived');
        if (state.ui.recruitingFilter && state.ui.recruitingFilter !== 'all') parts.push(state.ui.recruitingFilter);
      }

      // Selected player modal
      if (state.ui.selectedPlayerId) {
        const player = state.players.find(p => p.id === state.ui.selectedPlayerId);
        if (player) {
          ctx.selectedPlayer = { name: player.name, position: player.position, clutchFactor: player.clutchFactor, fitScore: player.fitScore };
          ctx.modalTab = state.ui.activeModalTab;
          parts.length = 0;
          parts.push(player.name, player.position || '', 'Clutch ' + (player.clutchFactor || '?'));
          if (state.ui.activeModalTab) parts.push(state.ui.activeModalTab + ' tab');
        }
      }

      // Visible player count
      if (!state.ui.selectedPlayerId && state.players) {
        const count = state.players.length;
        parts.push(count + ' player' + (count !== 1 ? 's' : ''));
      }

      ctx.description = parts.filter(Boolean).join(' \u00b7 ');
      return ctx;
    },

    updateContextBar() {
      const ctx = this.getViewContext();
      const desc = ctx ? ctx.description : '';
      if (desc === this._lastCtxDesc) return;
      this._lastCtxDesc = desc;
      const el = document.getElementById('nc-ctx-text');
      if (el) el.textContent = desc || 'No context available';
    },

    initResize() {
      const panel = document.getElementById('ntangible-chat-panel');
      panel.querySelectorAll('.nc-resize').forEach(zone => {
        zone.addEventListener('mousedown', (e) => {
          e.preventDefault();
          if (panel.classList.contains('nc-full')) return;
          const isCorner = zone.classList.contains('nc-resize-corner');
          const isLeft = zone.classList.contains('nc-resize-left');
          const isTop = zone.classList.contains('nc-resize-top');
          const startX = e.clientX;
          const startY = e.clientY;
          const startW = panel.offsetWidth;
          const startH = panel.offsetHeight;
          const msgArea = panel.querySelector('.nc-messages');
          const onMove = (ev) => {
            if (isCorner || isLeft) {
              panel.style.width = Math.max(460, startW - (ev.clientX - startX)) + 'px';
            }
            if (isCorner || isTop) {
              panel.style.height = Math.max(500, startH - (ev.clientY - startY)) + 'px';
              panel.style.maxHeight = 'none';
              if (msgArea) msgArea.style.maxHeight = 'none';
            }
          };
          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            document.body.style.userSelect = '';
          };
          document.body.style.userSelect = 'none';
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      });
    },

    getDisplayMode() {
      const panel = document.getElementById('ntangible-chat-panel');
      if (panel.classList.contains('nc-full')) return 'full';
      const w = panel.offsetWidth;
      const h = panel.offsetHeight;
      if (w > 600 || h > 700) return 'half';
      return 'compact';
    },

    getVisiblePlayers() {
      if (typeof state === 'undefined' || !state.players) return [];
      return state.players.map(p => ({
        id: p.id, name: p.name, position: p.position,
        clutchFactor: p.clutchFactor, fitScore: p.fitScore,
        level: p.level, type: p.type, graduationYear: p.graduationYear,
        commStyle: p.commStyle, learningStyle: p.learningStyle, motivation: p.motivation,
        history: p.history || [],
      }));
    },

    setPlayerContext(player) {
      this.playerContext = player;
      const el = document.getElementById('nc-player-ctx');
      if (player) {
        el.textContent = 'Viewing: ' + player.name + ' | Clutch: ' + player.clutchFactor + ' | Fit: ' + player.fitScore + '%';
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    },

    sendOption(text) {
      document.querySelectorAll('.nc-options').forEach(el => el.remove());
      document.getElementById('nc-input').value = text;
      this.send();
    },

    renderMiniSparkline(history) {
      if (!history || history.length < 2) return '';
      const w = 50, h = 18, pad = 2;
      const min = Math.min(...history), max = Math.max(...history);
      const range = max - min || 1;
      const pts = history.map((v, i) => {
        const x = pad + (i / (history.length - 1)) * (w - pad * 2);
        const y = h - pad - ((v - min) / range) * (h - pad * 2);
        return x + ',' + y;
      });
      const up = history[history.length - 1] >= history[0];
      const color = up ? '#22c55e' : '#ef4444';
      return '<svg class="nc-viz-sparkline" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '"><polyline points="' + pts.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="1.5"/></svg>';
    },

    getValueDotClass(key, value) {
      if (key === 'clutchFactor') {
        if (value >= 800) return 'nc-viz-dot-green';
        if (value >= 600) return 'nc-viz-dot-blue';
        if (value >= 400) return 'nc-viz-dot-amber';
        return 'nc-viz-dot-gray';
      }
      if (key === 'fitScore') {
        if (value >= 80) return 'nc-viz-dot-green';
        if (value >= 60) return 'nc-viz-dot-blue';
        if (value >= 40) return 'nc-viz-dot-amber';
        return 'nc-viz-dot-gray';
      }
      return '';
    },

    renderVizTable(data) {
      if (!data.players || data.players.length === 0) return '';
      const isExp = data._expanded;
      const metrics = ['position','clutchFactor','fitScore','archetype','commStyle','motivation'];
      const labels = ['Pos','Clutch','Fit','Cohort','Comm','Motivation'];
      const best = {};
      best.clutchFactor = Math.max(...data.players.map(p => p.clutchFactor || 0));
      best.fitScore = Math.max(...data.players.map(p => p.fitScore || 0));

      let html = '<div class="nc-viz-table-wrap"><table class="nc-viz-table"><thead><tr><th></th>';
      data.players.forEach(p => {
        let displayName;
        if (isExp) {
          displayName = p.name;
        } else {
          const parts = (p.name || '').split(',');
          displayName = parts.length > 1 ? parts[0].trim() + ', ' + parts[1].trim().charAt(0) + '.' : p.name;
        }
        html += '<th class="nc-viz-player-name">' + this.escapeHtml(displayName) + '</th>';
      });
      html += '</tr></thead><tbody>';

      metrics.forEach((key, i) => {
        html += '<tr><td style="font-weight:600;color:#94a3b8">' + labels[i] + '</td>';
        data.players.forEach(p => {
          const val = p[key] != null ? p[key] : '\u2014';
          const isBest = (key === 'clutchFactor' && p.clutchFactor === best.clutchFactor && data.players.length > 1) ||
                         (key === 'fitScore' && p.fitScore === best.fitScore && data.players.length > 1);
          const dotClass = this.getValueDotClass(key, typeof val === 'number' ? val : 0);
          const dot = dotClass ? '<span class="nc-viz-dot ' + dotClass + '"></span>' : '';
          html += '<td>' + dot + this.escapeHtml(String(val)) + (key === 'fitScore' ? '%' : '') + (isBest ? '<span class="nc-viz-crown-icon">&#9733;</span>' : '') + '</td>';
        });
        html += '</tr>';
      });

      html += '</tbody></table></div>';

      if (data.insight) {
        html += '<div class="nc-viz-insight">' + this.escapeHtml(data.insight) + '</div>';
      }

      return html;
    },

    getTierColor(tier) {
      const t = (tier || '').toLowerCase();
      if (t === 'elite') return '#22c55e';
      if (t === 'high performer') return '#3b82f6';
      if (t === 'solid') return '#f59e0b';
      if (t === 'developmental') return '#94a3b8';
      if (t === 'exceptional' || t === 'strong') return '#3b82f6';
      if (t === 'conditional' || t === 'moderate') return '#f59e0b';
      if (t === 'poor' || t === 'low') return '#cbd5e1';
      return '#3b82f6';
    },

    renderVizBar(data, expanded) {
      if (!data.items || data.items.length === 0) return '';
      const isExp = expanded || data._expanded;
      const padL = 14, labelW = isExp ? 140 : 100, chartW = isExp ? 200 : 130, valueW = isExp ? 100 : 40, rowH = isExp ? 26 : 20, pad = 2;
      const totalW = padL + labelW + chartW + valueW;
      const totalH = data.items.length * rowH + pad;
      const maxVal = data.maxValue || Math.max(...data.items.map(i => i.value)) || 1;

      let svg = '<svg class="nc-viz-svg" viewBox="0 0 ' + totalW + ' ' + totalH + '">';
      data.items.forEach((item, i) => {
        const y = i * rowH + pad;
        const barW = Math.max(2, (item.value / maxVal) * chartW);
        const barColor = item.tier ? this.getTierColor(item.tier) : '#3b82f6';
        const barX = padL + labelW;
        const name = isExp && item.fullName ? item.fullName : item.label;
        svg += '<text x="' + (barX - 4) + '" y="' + (y + (isExp ? 17 : 13)) + '" text-anchor="end" class="nc-viz-bar-label">' + this.escapeHtml(name) + '</text>';
        svg += '<rect x="' + barX + '" y="' + (y + 2) + '" width="' + barW + '" height="' + (rowH - 5) + '" fill="' + barColor + '" class="nc-viz-bar-rect"/>';
        const valueText = isExp && item.tier ? item.value + ' (' + item.tier + ')' : String(item.value);
        svg += '<text x="' + (barX + chartW + 4) + '" y="' + (y + (isExp ? 17 : 13)) + '" class="nc-viz-bar-value">' + valueText + '</text>';
      });
      svg += '</svg>';
      return svg;
    },

    renderVizRadar(data) {
      if (!data.dimensions || data.dimensions.length === 0) return '';
      const isExp = data._expanded;
      const cx = 160, cy = 150, radius = isExp ? 95 : 80;
      const dims = data.dimensions;
      const n = dims.length;
      const totalW = 320, totalH = 310;

      let svg = '<svg class="nc-viz-svg" viewBox="0 0 ' + totalW + ' ' + totalH + '">';

      // Grid rings
      [0.25, 0.5, 0.75, 1.0].forEach(scale => {
        let pts = [];
        for (let i = 0; i < n; i++) {
          const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
          pts.push((cx + Math.cos(angle) * radius * scale).toFixed(1) + ',' + (cy + Math.sin(angle) * radius * scale).toFixed(1));
        }
        svg += '<polygon points="' + pts.join(' ') + '" class="nc-viz-radar-grid"/>';
      });

      // Axes
      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        const ex = cx + Math.cos(angle) * radius;
        const ey = cy + Math.sin(angle) * radius;
        svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + ex.toFixed(1) + '" y2="' + ey.toFixed(1) + '" class="nc-viz-radar-axis"/>';
      }

      // Data polygon
      let dataPts = [];
      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        const val = (dims[i].value || 0) / 100;
        const px = cx + Math.cos(angle) * radius * val;
        const py = cy + Math.sin(angle) * radius * val;
        dataPts.push(px.toFixed(1) + ',' + py.toFixed(1));
      }
      svg += '<polygon points="' + dataPts.join(' ') + '" class="nc-viz-radar-polygon"/>';

      // Dots + labels
      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        const val = (dims[i].value || 0) / 100;
        const px = cx + Math.cos(angle) * radius * val;
        const py = cy + Math.sin(angle) * radius * val;
        svg += '<circle cx="' + px.toFixed(1) + '" cy="' + py.toFixed(1) + '" r="2.5" class="nc-viz-radar-dot"/>';

        const labelDist = radius + (isExp ? 28 : 24);
        const lx = cx + Math.cos(angle) * labelDist;
        const ly = cy + Math.sin(angle) * labelDist;
        const maxLen = isExp ? 30 : 18;
        const shortLabel = dims[i].label.length > maxLen ? dims[i].label.slice(0, maxLen - 2) + '..' : dims[i].label;
        svg += '<text x="' + lx.toFixed(1) + '" y="' + (ly + 3).toFixed(1) + '" class="nc-viz-radar-label">' + this.escapeHtml(shortLabel) + '</text>';
      }

      svg += '</svg>';
      return svg;
    },

    renderVizTrend(data) {
      if (!data.points || data.points.length < 2) return '';
      const pts = data.points;
      const labels = data.labels || pts.map((_, i) => 'P' + (i + 1));
      const padL = 10, padR = 10, padT = 20, padB = 28;
      const totalW = 280, totalH = 120;
      const chartW = totalW - padL - padR, chartH = totalH - padT - padB;
      const min = Math.min(...pts), max = Math.max(...pts);
      const range = max - min || 1;
      const up = pts[pts.length - 1] >= pts[0];

      const coords = pts.map((v, i) => {
        const x = padL + (i / (pts.length - 1)) * chartW;
        const y = padT + (1 - (v - min) / range) * chartH;
        return { x, y, v };
      });

      let svg = '<svg class="nc-viz-svg" viewBox="0 0 ' + totalW + ' ' + totalH + '">';

      // Gradient fill
      const fillPts = coords.map(c => c.x.toFixed(1) + ',' + c.y.toFixed(1)).join(' ');
      const bottomY = padT + chartH;
      svg += '<defs><linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + (up ? '#22c55e' : '#ef4444') + '" stop-opacity=".2"/><stop offset="100%" stop-color="' + (up ? '#22c55e' : '#ef4444') + '" stop-opacity="0"/></linearGradient></defs>';
      svg += '<polygon points="' + coords[0].x.toFixed(1) + ',' + bottomY + ' ' + fillPts + ' ' + coords[coords.length - 1].x.toFixed(1) + ',' + bottomY + '" fill="url(#trendGrad)" class="nc-viz-trend-fill"/>';

      // Line
      const linePts = coords.map(c => c.x.toFixed(1) + ',' + c.y.toFixed(1)).join(' ');
      svg += '<polyline points="' + linePts + '" class="nc-viz-trend-line" stroke="' + (up ? '#22c55e' : '#ef4444') + '"/>';

      // Dots + values + labels
      coords.forEach((c, i) => {
        svg += '<circle cx="' + c.x.toFixed(1) + '" cy="' + c.y.toFixed(1) + '" r="3.5" class="nc-viz-trend-dot"/>';
        svg += '<text x="' + c.x.toFixed(1) + '" y="' + (c.y - 8).toFixed(1) + '" class="nc-viz-trend-val">' + c.v + '</text>';
        svg += '<text x="' + c.x.toFixed(1) + '" y="' + (bottomY + 14).toFixed(1) + '" class="nc-viz-trend-label">' + this.escapeHtml(labels[i] || '') + '</text>';
      });

      svg += '</svg>';
      return svg;
    },

    expandViz(viz) {
      const overlay = document.createElement('div');
      overlay.className = 'nc-viz-modal-overlay';
      const expandedData = Object.assign({}, viz.data, { _expanded: true });
      let bodyHtml = '';
      if (viz.type === 'table') bodyHtml = this.renderVizTable(expandedData);
      else if (viz.type === 'bar') bodyHtml = this.renderVizBar(expandedData, true);
      else if (viz.type === 'radar') bodyHtml = this.renderVizRadar(expandedData);
      else if (viz.type === 'trend') bodyHtml = this.renderVizTrend(expandedData);
      overlay.innerHTML = '<div class="nc-viz-modal-content" onclick="event.stopPropagation()">' +
        '<div class="nc-viz-modal-header"><div class="nc-viz-title"><span>' + this.escapeHtml(viz.title) + '</span></div>' +
        '<button class="nc-viz-modal-close" title="Close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>' +
        '<div class="nc-viz-modal-body">' + bodyHtml + '</div></div>';
      overlay.addEventListener('click', () => overlay.remove());
      overlay.querySelector('.nc-viz-modal-close').addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
    },

    addMessage(role, content, videos, options, visualizations) {
      const container = document.getElementById('nc-messages');
      const div = document.createElement('div');
      div.className = 'nc-msg ' + role;
      const prev = container.querySelector('.nc-msg:last-of-type');
      if (!prev || !prev.classList.contains(role)) div.classList.add('nc-turn-start');

      if (role === 'assistant') {
        div.innerHTML = this.renderMarkdown(content);
      } else {
        div.textContent = content;
      }

      container.appendChild(div);

      if (visualizations && visualizations.length > 0) {
        visualizations.forEach(viz => {
          const vizDiv = document.createElement('div');
          vizDiv.className = 'nc-viz';
          let html = '<div class="nc-viz-title"><span>' + this.escapeHtml(viz.title) + '</span>';
          html += '<button class="nc-viz-expand-btn" title="Expand"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button></div>';
          if (viz.type === 'table') html += this.renderVizTable(viz.data);
          else if (viz.type === 'bar') html += this.renderVizBar(viz.data);
          else if (viz.type === 'radar') html += this.renderVizRadar(viz.data);
          else if (viz.type === 'trend') html += this.renderVizTrend(viz.data);
          vizDiv.innerHTML = html;
          vizDiv.querySelector('.nc-viz-expand-btn').addEventListener('click', () => this.expandViz(viz));
          container.appendChild(vizDiv);
        });
      }

      if (videos && videos.length > 0) {
        videos.forEach(v => {
          const videoDiv = document.createElement('div');
          videoDiv.className = 'nc-video';
          const embedUrl = this.getEmbedUrl(v.url);
          videoDiv.innerHTML = '<div class="nc-video-title">' + this.escapeHtml(v.title) + '</div>' +
            (embedUrl ? '<iframe src="' + embedUrl + '" allowfullscreen loading="lazy"></iframe>' : '<a href="' + this.escapeHtml(v.url) + '" target="_blank" rel="noopener">Watch Video</a>');
          container.appendChild(videoDiv);
        });
      }

      if (options && options.length > 0) {
        const optDiv = document.createElement('div');
        optDiv.className = 'nc-options';
        options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'nc-option-btn';
          btn.textContent = opt;
          btn.onclick = () => window.ntangibleChat.sendOption(opt);
          optDiv.appendChild(btn);
        });
        container.appendChild(optDiv);
      }

      this.scrollToBottom();
    },

    showTyping() {
      const container = document.getElementById('nc-messages');
      const div = document.createElement('div');
      div.className = 'nc-typing';
      div.id = 'nc-typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      container.appendChild(div);
      this.scrollToBottom();
    },

    hideTyping() {
      const el = document.getElementById('nc-typing-indicator');
      if (el) el.remove();
    },

    async send() {
      if (this.sending) return;
      const input = document.getElementById('nc-input');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      input.style.height = 'auto';
      this.sending = true;
      document.getElementById('nc-send-btn').disabled = true;

      this.addMessage('user', message);
      this.showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            sessionId: this.sessionId,
            displayMode: this.getDisplayMode(),
            viewContext: this.getViewContext(),
            visiblePlayers: this.getVisiblePlayers(),
            playerContext: this.playerContext ? {
              id: this.playerContext.id,
              name: this.playerContext.name,
              position: this.playerContext.position,
              level: this.playerContext.level,
              graduationYear: this.playerContext.graduationYear,
              clutchFactor: this.playerContext.clutchFactor,
              fitScore: this.playerContext.fitScore,
              commStyle: this.playerContext.commStyle,
              learningStyle: this.playerContext.learningStyle,
              motivation: this.playerContext.motivation,
              type: this.playerContext.type,
            } : null,
          }),
        });

        const data = await res.json();
        this.hideTyping();

        if (data.error) {
          this.addMessage('assistant', 'Sorry, something went wrong. Please try again.');
        } else {
          this.addMessage('assistant', data.message, data.videos, data.options, data.visualizations);
        }
      } catch (err) {
        this.hideTyping();
        this.addMessage('assistant', 'Connection error. Please check your network and try again.');
      }

      this.sending = false;
      document.getElementById('nc-send-btn').disabled = false;
    },

    async loadHistory() {
      try {
        const res = await fetch('/api/history?sessionId=' + encodeURIComponent(this.sessionId));
        const data = await res.json();
        if (data.messages && data.messages.length > 0) {
          data.messages.forEach(m => {
            const videos = m.metadata && m.metadata.videos ? m.metadata.videos : [];
            this.addMessage(m.role, m.content, videos);
          });
        }
      } catch (err) {
        // History load failed silently - fresh session
      }
    },

    async syncPlayers() {
      try {
        if (typeof state !== 'undefined' && state.players) {
          await fetch('/api/sync-players', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ players: state.players }),
          });
        }
      } catch (err) {
        // Sync failed silently
      }
    },

    renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^/, '<p>')
        .replace(/$/, '</p>')
        .replace(/<p><\/p>/g, '')
        .replace(/<p>(<ul>)/g, '$1')
        .replace(/(<\/ul>)<\/p>/g, '$1');
    },

    getEmbedUrl(url) {
      if (!url) return null;
      const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);
      return match ? 'https://www.youtube.com/embed/' + match[1] : null;
    },

    escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    },

    scrollToBottom() {
      const el = document.getElementById('nc-messages');
      setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
    },
  };

  window.ntangibleChat = chat;
  document.addEventListener('DOMContentLoaded', () => chat.init());
})();
</script>

</body>
</html>
