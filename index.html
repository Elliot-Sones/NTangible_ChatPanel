<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTangible Baseball</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
       
        /* Animation Utilities */
        .animate-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
       
        /* Custom Utilities */
        .bg-black {
            background-color: #000 !important;
        }
        .text-blue {
            color: #2563eb !important;
        }
        .border-dashed {
            border-style: dashed !important;
        }
        .cursor-pointer {
            cursor: pointer;
        }
        .filter-pill {
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 50rem; /* Pill shape */
            padding: 0.4rem 1rem;
            transition: all 0.2s;
        }
        .filter-pill.active {
            background-color: #000;
            color: #fff;
            border: 1px solid #000;
        }
        .filter-pill:not(.active) {
            background-color: #fff;
            color: #6c757d;
            border: 1px solid #dee2e6;
        }
        .filter-pill:not(.active):hover {
            border-color: #adb5bd;
            color: #000;
        }
       
        /* Form Select Custom */
        .form-select-sm-custom {
            font-size: 0.8rem;
            font-weight: 600;
            border-color: #dee2e6;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }
        .form-select-sm-custom:focus {
            border-color: #000;
            box-shadow: 0 0 0 0.25rem rgba(0, 0, 0, 0.1);
        }

        /* Table Styles */
        .table-custom th {
            font-size: 0.75rem;
            font-weight: 700;
            color: #374151; /* Darker gray for headers */
            letter-spacing: 0;
            padding-top: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .table-custom td {
            font-size: 0.9rem;
            padding-top: 1.25rem;
            padding-bottom: 1.25rem;
            color: #374151;
            vertical-align: middle;
            border-bottom: 1px solid #f3f4f6;
        }
        .table-custom tr:last-child td {
            border-bottom: none;
        }
        .nterpret-link {
            color: #4f46e5; /* Indigo/Blue similar to screenshot */
            text-decoration: none;
        }
        .nterpret-link:hover {
            text-decoration: underline;
        }

        /* Matrix / Kanban Styles */
        .matrix-column {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 1rem;
            height: 100%;
            border: 1px solid #e2e8f0;
        }
        .matrix-header {
            padding-bottom: 1rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-card {
            background: white;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s;
            cursor: pointer;
        }
        .player-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-color: #e2e8f0;
        }
        .tag-pill {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }
       
        /* Guide Tabs */
        .guide-tab-btn {
            border: none;
            background: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
            padding: 1rem 0;
            margin-right: 2rem;
            position: relative;
            transition: color 0.2s;
        }
        .guide-tab-btn.active {
            color: #2563eb;
        }
        .guide-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #2563eb;
        }
        .guide-tab-btn.active.tab-warning::after {
            background-color: #ca8a04; /* Yellow-600 */
        }
        .guide-tab-btn.active.tab-warning {
             color: #ca8a04;
        }
       
        .guide-tab-btn:hover {
            color: #111;
        }

        .action-btn {
            background: none;
            border: none;
            color: #6b7280;
            transition: color 0.2s;
        }
        .action-btn:hover {
            color: #111;
        }

        .signifier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.75rem;
        }
        .signifier-card {
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            background: #fff;
        }
        .signifier-rule {
            font-size: 0.72rem;
            color: #6b7280;
            margin-top: 0.25rem;
            line-height: 1.4;
        }
       
        /* Toggle Switch for Recruiting */
        .toggle-switch {
            display: inline-flex;
            background-color: #e2e8f0;
            border-radius: 6px;
            padding: 2px;
        }
        .toggle-switch button {
            border: none;
            background: none;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 4px;
            color: #64748b;
            transition: all 0.2s;
        }
        .toggle-switch button.active {
            color: #0f172a;
            background-color: #fff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .toggle-switch button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            color: #94a3b8;
        }
       
        /* Modal Tabs Specific Style */
        .modal-nav-tabs .nav-link {
            border: 1px solid #e5e7eb;
            color: #6b7280;
            background-color: transparent;
            border-radius: 4px;
            margin-right: 0.5rem;
            padding: 0.5rem 1rem;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .modal-nav-tabs .nav-link:hover {
            background-color: #f9fafb;
            color: #111;
        }
        .modal-nav-tabs .nav-link.active {
            color: #2563eb;
            background-color: #eff6ff; /* light blue bg */
            border-color: #bfdbfe;
        }

        /* Recruit Nav Tabs */
        .recruit-nav-link {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            color: #64748b;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .recruit-nav-link:hover {
            color: #1e293b;
        }
        .recruit-nav-link.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }
       
        /* Training Card */
        .training-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.2s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .training-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #cbd5e1;
        }
        .exercise-item {
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 0.75rem;
            border: 1px solid #f1f5f9;
        }
       
        /* Training List Item */
        .training-list-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .training-list-item:hover {
            background-color: #f1f5f9;
        }
        .training-list-item.active {
            background-color: #eff6ff;
            border-color: #bfdbfe;
        }

        /* Exercise Card (New Punchy Design) */
        .exercise-card {
            transition: all 0.2s ease;
            border-left: 0;
        }
        .exercise-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08) !important;
        }
        .hover-scale {
            transition: transform 0.2s;
        }
        .hover-scale:hover {
            transform: scale(1.1);
            background-color: #e0e7ff !important;
            border-color: #c7d2fe !important;
        }
        .hover-scale:hover i {
            color: #4f46e5 !important;
        }
       
        /* Team Pulse Card */
        .pulse-card {
            background: #fff;
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }
        .pulse-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Custom Checkbox */
        .form-check-input-lg {
            width: 1.2em;
            height: 1.2em;
            margin-top: 0.2em;
            cursor: pointer;
            border: 2px solid #cbd5e1;
        }
        .form-check-input-lg:checked {
            background-color: #2563eb;
            border-color: #2563eb;
        }



        /* Layout tuning for responsive + desktop density */
        html, body {
            overflow-x: hidden;
        }
        .dashboard-shell {
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
        }

        .mobile-nav-menu {
            display: none;
        }

        .app-logo-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.45rem;
            color: #e2e8f0;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
            pointer-events: none;
        }


        @media (min-width: 992px) {
            .app-main {
                font-size: 1rem;
            }
            .dashboard-shell {

                padding-right: clamp(1.25rem, 2vw, 2.5rem);

            .app-main .g-5 {

                --bs-gutter-y: 2rem;

            .app-main .p-5,
            .app-main .px-5 {

                padding-right: 2rem !important;

            .app-main .p-5,

            .app-header-inner {

                --bs-gutter-x: 0.9rem;

            .app-main .display-6 {

            }
            .app-main h2,
            .app-main .h2 { font-size: 1.2rem; }
            .app-main h3,
            .app-main .h3 { font-size: 1rem; }
            .app-main h4,
            .app-main .h4 { font-size: 0.95rem; }
            .app-main .btn,
            .app-main .form-control,
            .app-main .form-select {
                font-size: 0.85rem;
            }
            .table-custom th {
                font-size: 0.68rem;
                padding-top: 0.75rem;
                padding-bottom: 0.75rem;
            }
            .table-custom td {
                font-size: 0.8rem;
                padding-top: 0.75rem;
                padding-bottom: 0.75rem;
            }
            .app-main .p-5,
            .app-main .px-5,
            .app-main .py-5 {
                padding: 0.9rem !important;
            }
            .app-main .mb-5 {

            }
            .app-main [style*="min-height: 700px"] {
                min-height: auto !important;
            }
            .app-main [style*="height: 650px"] {

            }
            .app-main [style*="max-height: 720px"],
            .app-main [style*="max-height: 80vh"] {

                display: none;
            }
        }

        /* PRINT STYLES */
        @media print {
            .no-print { display: none !important; }
            header, footer, .floating-compare-bar { display: none !important; }
           
            /* Expand columns that are normally constrained */
            .print-full-width {
                width: 100% !important;
                flex: 0 0 100% !important;
                max-width: 100% !important;
            }
           
            /* Remove scrollbars and height limits for printing */
            .custom-scrollbar, .h-100 {
                height: auto !important;
                max-height: none !important;
                overflow: visible !important;
            }
           
            /* Remove borders/shadows for cleaner print */
            .shadow-sm, .border, .border-end, .border-start {
                box-shadow: none !important;
                border: none !important;
            }
           
            /* Ensure background colors print */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
           
            /* Layout resets */
            body, #root, main, .container-fluid, .row {
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
            }

            /* Modal specific adjustments for printing */
            .modal {
                position: relative !important;
                display: block !important;
                background: white !important;
            }
            .modal-dialog {
                max-width: 100% !important;
                margin: 0 !important;
                transform: none !important;
            }
            .modal-content {
                border: none !important;
                box-shadow: none !important;
            }
            .modal-footer, .btn-close {
                display: none !important;
            }

                display: none !important;

    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100" style="font-family: 'Inter', sans-serif;">
    <div id="root" class="d-flex flex-column flex-grow-1">
        <div class="container py-5 text-center text-dark">
            <div class="spinner-border text-primary mb-3" role="status" aria-hidden="true"></div>
            <p class="mb-1 fw-semibold">Loading NTangible Baseball Dashboard...</p>
            <p class="mb-0 text-secondary small">If this screen persists, hard refresh (Ctrl/Cmd + Shift + R).</p>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <script>
        // Global error handler for debugging
        window.onerror = function(msg, url, line, col, error) {
            document.body.innerHTML = '<div style="padding: 20px; color: red;"><h1>Application Error</h1><pre>' + msg + '\n' + url + ':' + line + ':' + col + '</pre><pre>' + (error && error.stack ? error.stack : '') + '</pre></div>';
            return false;
        };

        // --- DATA & TYPES ---
        const POSITIONS = ['P', 'C', '1B', '2B', '3B', 'SS', 'LF', 'CF', 'RF', 'DH'];
        const SPORTS = ['Baseball'];
        const LEVELS = ['High School', 'NCAA', 'JUCO', 'PRO'];
        const GRAD_YEARS = ['2026', '2027', '2028', '2029', '2030', '2031'];
        const TESTING_ROUNDS = ['2026 Pre-Season', '2025 Pre-Season'];
        const COHORTS = ['Trust / Anchors', 'High Reward / High Maintenance', 'Culture Carriers', 'At Risk'];
       
        const COMM_STYLES = ['Direct', 'Supportive', 'Expressive', 'Reserved'];
        const LEARNING_STYLES = ['Visual', 'Auditory', 'Kinesthetic'];
        const MOTIVATION_ANCHORS = ['Intrinsic Growth', 'Competitive Edge', 'Team Commitment', 'Recognition/Opportunity'];

        const PSYCHOMETRIC_DOMAINS = [
            "Role Definition", "Adaptability Support", "Communication Style",
            "Feedback Cadence", "Pressure Motivation", "Accountability Style",
            "Trust Formation", "Teaching Approach", "Decision-Making", "Team Culture"
        ];

        const NTERPRET_RUBRIC = {
            communication: [
                { type: "Direct", desc: "Prioritizes clarity and efficiency. Speaks candidly and expects the same. Often perceived as blunt but values honesty above all.", strategy: "Be concise. Focus on 'what' and 'when'. Avoid sugarcoating feedback. Give clear, bottom-line instructions." },
                { type: "Supportive", desc: "Prioritizes harmony and connection. Values tone, reassurance, and emotional safety. Dislikes conflict and harsh criticism.", strategy: "Start with the positive. Use a warm tone. Validate feelings before correcting. Emphasize that feedback is for their support." },
                { type: "Expressive", desc: "Prioritizes energy and vision. Thinks out loud, uses emotion, and is often enthusiastic. Can be scattered but brings life to the dugout.", strategy: "Match their enthusiasm. Allow space for them to verbalize ideas. Focus on the big picture and the 'feeling' of the play." },
                { type: "Reserved", desc: "Prioritizes observation and reflection. Speaks only when necessary and processes internally. Values logic and time to think.", strategy: "Give them time to process before demanding an answer. Don't mistake silence for disinterest. Ask specific, open-ended questions." }
            ],
            learning: [
                { type: "Visual", desc: "Learns best by seeing. Processes information spatially and graphically. Needs to see the 'picture' of success.", strategy: "Use video analysis, diagrams, and demonstrations. 'Show, don't just tell'. Use visual cues for plays." },
                { type: "Auditory", desc: "Learns best by listening. Sensitive to tone, rhythm, and verbal cues. Can process complex verbal instructions.", strategy: "Use clear verbal cues. Ask them to repeat instructions back. Discuss concepts and 'talk shop' to reinforce learning." },
                { type: "Kinesthetic", desc: "Learns best by doing. Needs physical engagement and muscle memory. Learns through trial, error, and physical feeling.", strategy: "Prioritize reps and walkthroughs. Use physical cues/touch (with permission). Keep them moving; minimize long lectures." }
            ],
            motivation: [
                { type: "Intrinsic Growth", desc: "Driven by self-improvement, mastery, and the process of getting better. Competes primarily against themselves.", strategy: "Focus on technical details and personal bests. Track individual progress metrics. Frame challenges as skill acquisition." },
                { type: "Competitive Edge", desc: "Driven by winning, ranking, and beating opponents. Thrives on comparison and high-stakes moments.", strategy: "Gamify practice. Use leaderboards. Frame challenges as win/loss scenarios. Put something on the line." },
                { type: "Team Commitment", desc: "Driven by belonging, loyalty, and not letting the team down. Values the collective success over individual glory.", strategy: "Emphasize their role in the team success. Use partner drills. Highlight collective goals and how their effort helps the group." },
                { type: "Recognition / Opportunity", desc: "Driven by visibility, status, and the chance to advance (recruiting, starting role). Wants to be seen.", strategy: "Provide public praise for good performance. Clearly map out the path to starting roles or next-level opportunities. Showcase highlights." }
            ]
        };

        // --- NEW EXERCISE DATA ---
        const EXERCISE_LIBRARY = [
            { id: 1, title: "Focus Interval Training (The Staircase)", youtubeUrl: "https://youtu.be/QliFmb9QFbA", desc: "Set a timer for 30s and lock eyes on a tiny visual anchor. Reset if mind drifts. Build mental endurance.", fullText: "Elite focus is a muscle, and we need to train yours to hold heavy weight. Set a timer for 30 seconds and lock your eyes on a tiny visual anchor, like a scratch on your equipment. If your mind drifts even for a split second, stop, reset, and start again. If you can hold that laser focus for 30 seconds, push it to 45. This 'staircase' method builds the mental endurance required to stay locked in deep into overtime, so you never drift when the game is on the line.", insight: "Start with a static object (like a logo on a bat). Once mastered, graduate to a moving object (like a ceiling fan blade or a partner moving a ball) to simulate tracking without breaking cognitive lock." },
            { id: 2, title: "Distraction Control (The Gating Drill)", youtubeUrl: "https://youtu.be/MnfsxL0yqmU", desc: "Perform standard reps while a partner creates noise. Acknowledge distractions but execute through them.", fullText: "You need to own your space, no matter how loud the environment gets. Perform your standard physical rep while a partner tries to break your concentration—waving towels or making noise. Your job isn't to fight the distraction, but to acknowledge it and execute right through it. Focus strictly on the tactile feel of the movement. This drills the mental armor you need to walk into a hostile stadium and execute with surgical precision.", insight: "This trains 'Selective Attention'. Your brain learns to categorize crowd noise as 'background static' rather than 'threat', lowering cortisol spikes during away games." },
            { id: 3, title: "Wide-to-Narrow Toggles", youtubeUrl: "https://youtu.be/ZFSYk8qHxec", desc: "Practice shifting visual focus from peripheral (Wide) to micro-target (Narrow) to prevent tunnel vision.", fullText: "Under pressure, average players get tunnel vision; clutch players see everything. Stand in your competition stance and practice shifting gears. First, go 'Wide': see the whole field peripherally for 3 seconds. Then, go 'Narrow': snap your focus instantly to a micro-target for 3 seconds. Repeat this 5 times. This trains your brain to process information faster than the game speed, preventing panic and keeping you one step ahead.", insight: "Use this between pitches. Go 'Wide' to scan the defense, then snap 'Narrow' to the pitcher's release point. It prevents eye fatigue and keeps your visual processing speed elite." },
            { id: 4, title: "Box Breathing Reset (4-4-4-4)", youtubeUrl: "https://youtu.be/MDEsW3yE-K8", desc: "Inhale 4s, hold 4s, exhale 4s, hold 4s. A mechanical override switch to clear tension instantly.", fullText: "When the game speeds up, the elite know how to slow their internal engine down. Inhale through your nose for 4 seconds, hold for 4, exhale for 4, and hold empty for 4. This isn't just relaxation; it is a mechanical override switch for your nervous system. It clears the physical tension instantly so you can make a cold, calculated decision while everyone else is rushing.", insight: "The 'Hold Empty' phase is critical—it increases CO2 tolerance, which calms the amygdala (fear center). Use this specifically after a bad call or error." },
            { id: 5, title: "Cognitive Cooldown Walk", youtubeUrl: "https://youtu.be/FHwbZwAaLKk", desc: "Post-game 5-minute walk. Name objects neutrally to down-shift brain from combat mode.", fullText: "You cannot perform at 100% if you never recover. Immediately post-game, before checking your phone, take a 5-minute walk alone. Look around and simply name what you see—'blue chair,' 'green grass'—without judgment. We call this 'down-shifting.' It pulls your brain out of combat mode so you can recharge your battery completely for the next battle.", insight: "This prevents 'Competition Hangover'. By manually switching off your fight-or-flight response, you improve sleep quality and recovery speed for the next day's game." },
            { id: 6, title: "Body Scan Check", youtubeUrl: "https://youtu.be/yNTzdDLGv-U", desc: "Scan body for tension. Tense hard for 5s, then release. Train awareness to detect tightness mid-game.", fullText: "Hidden tension kills mechanics. Lay flat and scan your body from toes to head. Tense a muscle group hard for 5 seconds, then let it go completely. Feel the difference between 'locked' and 'loose.' This trains your awareness so you can detect tightness in your shoulders or hands mid-game and release it instantly, keeping your movement fluid and explosive.", insight: "Most errors come from 'guarding' (unconscious tension). Doing this pre-game helps you identify which muscle groups are carrying stress today so you can stretch them specifically." },
            { id: 7, title: "Post-Error Reset (The Flush)", youtubeUrl: "https://youtu.be/bMzY1OILR-k", desc: "Pick a physical trigger (e.g., unstrap glove). Hit it after an error to delete it from RAM.", fullText: "The most dangerous player is the one who doesn't care about the last mistake. Pick a physical trigger—like unstrapping a glove. The moment an error happens, hit that trigger, take a breath, and say 'Flush.' That physical action deletes the error from your RAM. It allows you to step into the next play with zero baggage, ready to make an impact.", insight: "The physical anchor is key. You are conditioning a Pavlovian response: Physical Action = Emotional Reset. Over time, the motion alone will lower your heart rate." },
            { id: 8, title: "Bounce-Back Planning (If-Then)", youtubeUrl: "https://youtu.be/rIYKDBFWUxE", desc: "Script responses: 'IF I make a mistake, THEN I will...' Execute protocol over emotion.", fullText: "Amateurs react with emotion; pros respond with protocol. Script your response now. Write down: 'IF I make a mistake, THEN I will look at a specific spot, take a breath, and reset.' When adversity hits, you don't have to think or feel; you just execute the protocol. This keeps you in control and dangerous even when things go wrong.", insight: "This outsources decision making. Under stress, your frontal cortex (logic) shuts down. Having a pre-loaded script bypasses the need for logic and relies on automatic execution." },
            { id: 9, title: "Adversity Simulation (Worst Case)", youtubeUrl: "https://youtu.be/hx6QV34DJhI", desc: "Start drills with massive disadvantages. Inoculate yourself to pressure so real games feel slow.", fullText: "We don't hope for easy games; we train for the war. Start a practice drill with a massive disadvantage—down on the scoreboard with seconds left. Your goal isn't just to win, but to keep your body language dominant. We call this 'inoculation.' By living in the fire during practice, the pressure of a real game will feel slow, familiar, and manageable.", insight: "The goal is 'Desensitization'. If you normalize panic in practice, your brain won't spike adrenaline during the game, allowing you to maintain fine motor control." },
            { id: 10, title: "Success Memory Bank (Highlight Reel)", youtubeUrl: "https://youtu.be/ZhJ_e2gxOC0", desc: "Write down 3 winning moments daily. Visualize in 4K. Overwrite doubt with evidence of greatness.", fullText: "Doubt is just a bad habit. We need to overwrite it with evidence of your greatness. Every night, write down three winning moments from your day—even small ones. Visualize them in 4K detail before sleep. This builds a 'Highlight Reel' in your subconscious that crowds out fear and reminds you that you are built for this level.", insight: "Do this right before sleep. Your brain consolidates memory during REM cycles. Programming success visuals pre-sleep physically rewires neural pathways for confidence." },
            { id: 11, title: "Confidence Scripting (I Am)", youtubeUrl: "https://youtu.be/Qc7q9L_NRlU", desc: "Create a mantra (e.g., 'I own the box'). Repeat internally to prime aggressive identity.", fullText: "You perform who you believe you are. Create a mantra that defines your highest self, like 'I am a relentless competitor' or 'I own the box.' Repeat it internally every time you step into the arena. This primes your identity, pushing out hesitation and ensuring you play aggressive, assertive, and without fear.", insight: "This is 'Self-Signaling'. You are broadcasting your intent to your own nervous system. It shifts your posture and hormone levels (testosterone vs cortisol) before the play starts." },
            { id: 12, title: "Self-Talk Optimization (Neutral Thinking)", youtubeUrl: "https://youtu.be/4nw7gEFyBuQ", desc: "Flip 'I was terrible' to 'My hands were slow'. Replace judgment with instruction.", fullText: "Emotion is slow; neutral is fast. When you catch yourself saying 'I was terrible,' flip it immediately to data: 'My hands were slow, I need to be quicker.' Replace judgment with instruction. This keeps your brain in 'Correction Mode' rather than 'Victim Mode,' allowing you to make adjustments on the fly and stay in the fight.", insight: "Judgment ('I suck') is vague and unfixable. Data ('I was late') is specific and actionable. Specificity cures anxiety." },
            { id: 13, title: "Visualization (Perfect Rep)", youtubeUrl: "https://youtu.be/4SxwpRLBpUA", desc: "Visualize executing perfectly in real-time. Fire neural pathways to build automatic muscle memory.", fullText: "Get your reps in before you even step on the field. Find a quiet spot, close your eyes, and visualize yourself executing perfectly in real-time. Feel the texture of the equipment, hear the crowd, see the result. This fires the same neural pathways as physical practice, giving you 'free reps' that build the automatic muscle memory needed to execute without thinking.", insight: "Include all senses (smell of grass, sound of cleat on dirt). The more sensory details, the more the brain treats the visualization as a real physical repetition." },
            { id: 14, title: "Post-Performance Journaling", youtubeUrl: "https://youtu.be/2KVr7IgVNOc", desc: "Write 3 things: What went well, what needs work, how to fix it. Harvest data, stop dwelling.", fullText: "Don't carry the game home; harvest the data and move on. Write down three things: what you did well, what needs work, and exactly how you'll fix it. This turns every performance into intelligence. It stops you from dwelling on the past and gives you a clear, tactical plan to be better tomorrow than you were today.", insight: "This closes the 'Open Loop'. Your brain dwells on unfinished tasks. By writing a plan, you tell your brain the task is 'handled', allowing you to mentally let go." }
        ];

        const ALIGNMENT_RUBRIC_DATA = [
            { range: [75, 100], rating: "EXCEPTIONAL", bg: "#ecfccb", color: "#365314", desc: "This player processes the game exactly like the coach. In high-pressure moments, they will instinctively make the decision the coach would have called. They require minimal verbal instruction because the intent is implicitly understood." },
            { range: [62.5, 74.9], rating: "STRONG", bg: "#dbeafe", color: "#1e40af", desc: "This player agrees with the coach's goals but may see a different path to get there. They will execute the system, but they will ask questions in the film room. This friction is healthy; it prevents the coach from becoming stale without breaking the system." },
            { range: [50, 62.4], rating: "CONDITIONAL", bg: "#fef9c3", color: "#854d0e", desc: "This is a transactional fit. The player does not naturally 'get' the coach's philosophy. The relationship requires constant maintenance (clear rules, explicit rewards). If playing time drops or the team loses, the disconnect in values will surface as conflict." },
            { range: [37.5, 49.9], rating: "DEVELOPMENTAL", bg: "#ffedd5", color: "#9a3412", desc: "The player and coach currently process key decisions differently. Success is still possible, but only with explicit role clarity, structure, and planned communication touchpoints." },
            { range: [0, 37.4], rating: "LOW ALIGNMENT", bg: "#fee2e2", color: "#991b1b", desc: "Current fit indicators show high friction risk. Treat this as a prompt for deeper conversation, expectation-setting, and context review before making long-term commitments." }
        ];

        // --- HELPER FUNCTIONS ---
        function getAlignmentDetails(score) {
            if (score === undefined || score === null) return { label: 'N/A', colorClass: 'bg-secondary', textClass: 'text-secondary', action: 'Assess Player' };
            if (score >= 75) return { label: 'Exceptional', colorClass: 'bg-success', textClass: 'text-success', badgeBg: '#ecfccb', badgeColor: '#365314', action: 'Delegate Authority' };
            if (score >= 62.5) return { label: 'Strong', colorClass: 'bg-primary', textClass: 'text-primary', badgeBg: '#dbeafe', badgeColor: '#1e40af', action: 'Refine Role' };
            if (score >= 50) return { label: 'Conditional', colorClass: 'bg-warning', textClass: 'text-warning', badgeBg: '#fef9c3', badgeColor: '#854d0e', action: 'Set Boundaries' };
            if (score >= 37.5) return { label: 'Developmental', colorClass: 'bg-orange', textClass: 'text-danger', badgeBg: '#ffedd5', badgeColor: '#9a3412', action: 'Monitor Closely' };
            return { label: 'Poor', colorClass: 'bg-danger', textClass: 'text-danger', badgeBg: '#fee2e2', badgeColor: '#991b1b', action: 'Evaluate Fit' };
        }
       
        function getArchetype(fitScore, clutchFactor) {
            if (fitScore === undefined || clutchFactor === undefined) return { name: "Unassessed", color: "#9ca3af" };
            const isHighFit = fitScore >= 62.5;
            const isHighClutch = clutchFactor >= 750;
            if (isHighFit && isHighClutch) return { name: "High Clutch / High Alignment", category: "Trust / Anchors", color: "#16a34a", bg: "#dcfce7", desc: "Elite output matching team culture.", action: "Maximize Role" };
            if (!isHighFit && isHighClutch) return { name: "High Clutch / Low Alignment", category: "High Reward / High Maintenance", color: "#ea580c", bg: "#ffedd5", desc: "Elite output but cultural mismatch.", action: "Monitor Impact" };
            if (isHighFit && !isHighClutch) return { name: "Low Clutch / High Alignment", category: "Culture Carriers", color: "#2563eb", bg: "#dbeafe", desc: "Strong cultural fit, developing output.", action: "Develop Skill" };
            return { name: "Low Clutch / Low Alignment", category: "At Risk", color: "#64748b", bg: "#f1f5f9", desc: "Developing output and cultural mismatch.", action: "Evaluate Fit" };
        }

        // --- EXERCISE LOGIC (UPDATED) ---
        function deterministicNumberFromString(input = '') {
            const source = String(input);
            let hash = 0;
            for (let i = 0; i < source.length; i++) {
                hash = ((hash << 5) - hash) + source.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        function getPrescribedExercises(player) {
            const seed = deterministicNumberFromString(`${player?.id || ''}-${player?.name || ''}`);
            const firstIndex = seed % EXERCISE_LIBRARY.length;
            const secondIndex = (firstIndex + 2) % EXERCISE_LIBRARY.length;
            return [EXERCISE_LIBRARY[firstIndex], EXERCISE_LIBRARY[secondIndex]];
        }

        // --- GENERATE SPARKLINE ---
        function generateSparkline(history) {
            if (!history || history.length < 3) return '';
            const width = 60;
            const height = 24;
            const min = Math.min(...history) - 5;
            const max = Math.max(...history) + 5;
            const range = max - min || 1; // avoid division by zero
           
            // Generate points
            const points = history.map((val, i) => {
                const x = (i / (history.length - 1)) * width;
                const y = height - ((val - min) / range) * height;
                return `${x},${y}`;
            }).join(' ');

            // Determine color based on trend (last vs first)
            const trendUp = history[history.length - 1] >= history[0];
            const color = trendUp ? '#16a34a' : '#dc2626'; // Green-600 : Red-600

            return `
            <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" fill="none" xmlns="http://www.w3.org/2000/svg" class="ms-2">
                <polyline points="${points}" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            `;
        }

        // --- SEEDED PRNG (deterministic — same players every time) ---
        function seededRng(seed) {
            let s = seed | 0;
            return function() {
                s = (s + 0x6D2B79F5) | 0;
                let t = Math.imul(s ^ (s >>> 15), 1 | s);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        // --- FIXED DATA GENERATOR (same 80 players every load) ---
        function generatePlayers(count) {
            const rand = seededRng(42);
            const firstNames = ['Jackson', 'Liam', 'Noah', 'Ethan', 'Logan', 'Lucas', 'Mason', 'Oliver', 'Elijah', 'Aiden', 'James', 'Robert', 'John', 'Michael', 'David', 'William', 'Richard', 'Joseph', 'Thomas', 'Christopher', 'Charles', 'Daniel', 'Matthew', 'Anthony', 'Mark', 'Steven', 'Paul', 'Andrew', 'Joshua', 'Kenneth'];
            const lastNames = ['Smith', 'Johnson', 'Williams', 'Brown', 'Jones', 'Garcia', 'Miller', 'Davis', 'Rodriguez', 'Martinez', 'Hernandez', 'Lopez', 'Gonzalez', 'Wilson', 'Anderson', 'Thomas', 'Taylor', 'Moore', 'Jackson', 'Martin', 'Lee', 'Perez', 'Thompson', 'White', 'Harris', 'Sanchez', 'Clark', 'Ramirez', 'Lewis', 'Robinson'];
            const seededRosterCount = 7;
            const players = [];
            for (let i = 0; i < count; i++) {
                let firstName, lastName, round, type;

                firstName = firstNames[Math.floor(rand() * firstNames.length)];
                lastName = lastNames[Math.floor(rand() * lastNames.length)];

                if (i < seededRosterCount) {
                    round = '2026 Pre-Season';
                    type = 'ROSTER';
                } else {
                    round = rand() > 0.3 ? '2026 Pre-Season' : '2025 Pre-Season';
                    type = rand() > 0.4 ? 'ROSTER' : 'RECRUIT';
                }
                const isInterested = i < 5;
                const weight = Math.floor(rand() * 60) + 160;
                const commStyle = COMM_STYLES[Math.floor(rand() * COMM_STYLES.length)];
                const learningStyle = LEARNING_STYLES[Math.floor(rand() * LEARNING_STYLES.length)];
                const motivation = MOTIVATION_ANCHORS[Math.floor(rand() * MOTIVATION_ANCHORS.length)];
                const dateTaken = new Date(1741600000000 - Math.floor(rand() * 31536000000)).toLocaleDateString('en-US', { month: 'numeric', day: 'numeric', year: '2-digit' });

                let level;
                if (type === 'ROSTER') {
                    level = 'NCAA';
                } else {
                    const recruitLevels = ['High School', 'JUCO', 'NCAA'];
                    level = recruitLevels[Math.floor(rand() * recruitLevels.length)];
                }

                let fitScore, clutchFactor;
                const profileType = rand();
                if (profileType > 0.75) { fitScore = Math.floor(rand() * 30) + 70; clutchFactor = Math.floor(rand() * 200) + 760; }
                else if (profileType > 0.5) { fitScore = Math.floor(rand() * 40) + 10; clutchFactor = Math.floor(rand() * 200) + 760; }
                else if (profileType > 0.25) { fitScore = Math.floor(rand() * 30) + 70; clutchFactor = Math.floor(rand() * 300) + 400; }
                else { fitScore = Math.floor(rand() * 50) + 10; clutchFactor = Math.floor(rand() * 300) + 300; }

                const hist1 = Math.max(0, Math.floor(clutchFactor + (rand() * 100 - 50)));
                const hist2 = Math.max(0, Math.floor(clutchFactor + (rand() * 60 - 30)));
                const history = [hist1, hist2, clutchFactor];

                players.push({
                    id: String(i + 1), name: `${lastName}, ${firstName}`, position: POSITIONS[Math.floor(rand() * POSITIONS.length)], level: level, graduationYear: 2026 + Math.floor(rand() * 6), clutchFactor: clutchFactor, needsRetest: rand() > 0.8, isInterested: isInterested, fitScore: fitScore, weight: weight, round: round, commStyle: commStyle, learningStyle: learningStyle, motivation: motivation, dateTaken: dateTaken, type: type, history: history
                });
            }
            return players.sort((a, b) => a.name.localeCompare(b.name));
        }

        function generateInvitesFromPlayers(players) {
            const rng = seededRng(99);
            const recruits = players.filter(p => p.type === 'RECRUIT');
            return recruits.map(p => {
                const r = rng();
                let status = 'Completed';
                if (r > 0.7) status = 'Pending'; else if (r > 0.6) status = 'In Progress';
                const times = ['2 days ago', '6 days ago', 'a week ago', '2 weeks ago', 'a month ago', '2 months ago'];
                const time = times[Math.floor(rng() * times.length)];
                const labelRand = rng();
                const commitmentLabel = labelRand > 0.78 ? 'Signed' : labelRand > 0.45 ? 'Offered' : 'Uncommitted';
                return {
                    id: p.id, name: p.name, dateInvited: time, status: status, commitmentLabel: commitmentLabel, clutchFactor: status === 'Completed' ? p.clutchFactor : '-', fitScore: status === 'Completed' ? p.fitScore : '-', position: p.position, graduationYear: p.graduationYear, isYourInvite: rng() > 0.5, isArchived: rng() > 0.90
                };
            });
        }

        function generateExtendedPlayerMetadata(player, allPlayers = []) {
            if (!player) return null;
            const roster = Array.isArray(allPlayers) && allPlayers.length ? allPlayers : [player];
           
            const parts = player.name.split(',');
            const lastName = parts[0].trim().toLowerCase();
            const firstName = parts[1] ? parts[1].trim().toLowerCase() : 'player';
            const domains = ['gmail.com', 'icloud.com', 'outlook.com'];
            const identitySeed = deterministicNumberFromString(`${player.id}-${player.name}-${player.graduationYear}`);
            const email = `${firstName}.${lastName}${(identitySeed % 89) + 10}@${domains[identitySeed % domains.length]}`;

            // Helper to build ranking list from array of players
            const getRankedList = (list) => list.sort((a, b) => b.clutchFactor - a.clutchFactor);
           
            const overallSorted = getRankedList([...roster]);
            const positionSorted = getRankedList(roster.filter(p => p.position === player.position));
            const gradSorted = getRankedList(roster.filter(p => p.graduationYear === player.graduationYear));
            const roundSorted = getRankedList(roster.filter(p => p.round === player.round));

            const getListForDisplay = (sortedList) => {
                const currentIndex = sortedList.findIndex(p => p.id === player.id);
                if (!sortedList.length) return [];

                const hasCurrent = currentIndex >= 0;
                const defaultWindowStart = 0;
                const contextualWindowStart = Math.max(0, currentIndex - 2);
                const rawStart = hasCurrent ? contextualWindowStart : defaultWindowStart;
                const windowStart = Math.min(rawStart, Math.max(0, sortedList.length - 5));
                const windowPlayers = sortedList.slice(windowStart, windowStart + 5);

                return windowPlayers.map((p, idx) => ({
                    rank: windowStart + idx + 1,
                    name: p.name,
                    score: p.clutchFactor,
                    isCurrent: p.id === player.id
                }));
            };

            const rankings = {
                overall: getListForDisplay(overallSorted),
                position: getListForDisplay(positionSorted),
                grad: getListForDisplay(gradSorted),
            };
           
            const positionalRank = positionSorted.findIndex(p => p.id === player.id) + 1;
            const roundPosRank = roundSorted.findIndex(p => p.id === player.id) + 1;
            const scoringRange = player.clutchFactor > 800 ? 'Elite' : player.clutchFactor > 600 ? 'High' : 'Developmental';

             const nsights = {
                summary: `${player.name} demonstrated remarkable agility and quick thinking during a challenging play. He effectively dodged a rogue ball and positioned himself to execute a timely stop, preserving the team's advantage. This highlights his ability to remain composed under pressure. However, there is room for improvement in his mental preparation, as seen in minor lapses during routine drills. His future steps to enhance awareness of his surroundings are commendable. By focusing on thorough checks before crucial moments, he can further solidify his clutch performance.`,
                practice: `Consider simulating high-pressure scenarios where unexpected obstacles are introduced. For example, during practice, introduce random elements as he begins his play. This will allow him to practice adapting while executing his tasks. Emphasizing reaction time and decision-making in these unpredictable situations will build his confidence and enhance his mental fitness.`,
                approach: `Initiate a conversation by acknowledging his quick thinking during recent plays. Highlight the importance of mental preparation and how it can affect performance during critical situations. Encourage him to reflect on what he felt during errors and discuss strategies to enhance his focus and situational awareness moving forward. This approach fosters a supportive environment while addressing areas for growth.`,
                coaching: `Encourage him to engage in visualization techniques that focus on executing flawless plays under pressure. By visualizing both successful and challenging scenarios, he can mentally prepare for various outcomes. Additionally, integrating mindfulness exercises before practice can help him cultivate a state of awareness that allows for better situational responses.`
            };

            const exercises = getPrescribedExercises(player);

            const commData = NTERPRET_RUBRIC.communication.find(c => c.type === player.commStyle) || NTERPRET_RUBRIC.communication[0];
            const learnData = NTERPRET_RUBRIC.learning.find(l => l.type === player.learningStyle) || NTERPRET_RUBRIC.learning[0];
            const motivData = NTERPRET_RUBRIC.motivation.find(m => m.type === player.motivation) || NTERPRET_RUBRIC.motivation[0];

            const nterpret = {
                summary: `${player.name.split(',')[0]} is a quintessential 'Big Game' player.`,
                considerations: [commData.strategy, learnData.strategy],
                mentallyTough: `Graham shows clear resilience: he asks for direct correction, recovers through practice, and converts high-stakes arousal into forward energy.`,
                commStyle: { title: player.commStyle, desc: commData.desc },
                learningStyle: { title: player.learningStyle, desc: learnData.desc },
                motivation: { title: player.motivation, desc: motivData.desc }
            };

            // Generate Psychometric Alignment
            const psychometrics = PSYCHOMETRIC_DOMAINS.map((domain, index) => {
                const val = deterministicNumberFromString(`${player.id}-${domain}`) % 100;
                let alignment = 'Moderate';
               
                // Weighting logic based on fitScore
                const score = player.fitScore || 50;
               
                if (score >= 75) { // Exceptional
                    if (val > 20) alignment = 'High';
                    else if (val > 5) alignment = 'Moderate';
                    else alignment = 'Low';
                } else if (score >= 62.5) { // Strong
                    if (val > 40) alignment = 'High';
                    else if (val > 10) alignment = 'Moderate';
                    else alignment = 'Low';
                } else if (score >= 50) { // Conditional
                     if (val > 60) alignment = 'High';
                    else if (val > 25) alignment = 'Moderate';
                    else alignment = 'Low';
                } else { // Developmental/Poor
                    if (val > 80) alignment = 'High';
                    else if (val > 40) alignment = 'Moderate';
                    else alignment = 'Low';
                }

                return { id: String(index + 1).padStart(2, '0'), domain, alignment };
            });

            // Get Description
            const rub = ALIGNMENT_RUBRIC_DATA.find(r => (player.fitScore || 0) >= r.range[0] && (player.fitScore || 0) <= r.range[1]) || ALIGNMENT_RUBRIC_DATA[ALIGNMENT_RUBRIC_DATA.length-1];

            const generateFitData = () => {
                if (player.fitScore === undefined) return null;
                const alignment = getAlignmentDetails(player.fitScore);
                let fitLabel = alignment.label;
                let summaryQuote = "\"This partnership exhibits potential for sustained elite performance due to strong natural alignment.\"";
                const archetype = getArchetype(player.fitScore, player.clutchFactor);
                return { fitLabel, summaryQuote, archetype, psychometrics, description: rub.desc };
            };

            return { email, scoringRange, roundPosRank, positionalRank, rankings, nsights, exercises, nterpret, coachesFit: generateFitData() };
        }

        // --- APP STATE ---
        const initialPlayers = generatePlayers(80);
        const state = {
            view: 'home', players: initialPlayers, invites: generateInvitesFromPlayers(initialPlayers),
            filters: { testingRound: '2026 Pre-Season', position: 'All', gradYear: 'All', commStyle: 'All', learningStyle: 'All', motivation: 'All', alignmentTier: 'All', cohort: 'All', recruitingGradYear: 'All', trainingExercise: 'All' },
            searchQuery: '', sort: { field: 'clutchFactor', direction: 'desc' },
            ui: {
                isDropdownOpen: false, selectedPlayerId: null, activeModalTab: 'Rankings', activeRubricType: null, activeGuideTab: 'communication', isNTerpretRubricOpen: false, analyzingIds: new Set(), activeNTerpretTab: 'Communication', alignmentTab: 'ROSTER', nterpretPlayerType: 'ROSTER', homeTab: 'ROSTER', isInviteModalOpen: false,
                // NEW RECRUITING STATE
                recruitingView: 'active', // 'active' | 'archived'
                recruitingFilter: 'all', // 'all' | 'signed' | 'offered' | 'uncommitted'
                recruitingStatus: 'completed', // 'completed' | 'pending'
                // NEW ACTION MATRIX STATE
                activeCohortGuideTab: 'Trust / Anchors',
                // NEW TRAINING STATE
                modalContext: 'default', // 'default' | 'training' | 'nterpret' | 'alignment'
                trainingSelectedPlayerId: null,
                nterpretSelectedPlayerId: null,
                // NEW RUBRIC TAB STATE
                activeRubricTab: 'scoring',

            openPrintDocument: (docHtml) => {
                const printWindow = window.open('', '_blank', 'width=920,height=1100');
                if (printWindow) {
                    printWindow.document.open();
                    printWindow.document.write(docHtml);
                    printWindow.document.close();

                    const triggerPrint = () => {
                        printWindow.focus();
                        printWindow.print();
                    };

                    if (printWindow.document.readyState === 'complete') triggerPrint();
                    else printWindow.onload = triggerPrint;
                    return;
                }

                const iframe = document.createElement('iframe');
                iframe.style.position = 'fixed';
                iframe.style.right = '0';
                iframe.style.bottom = '0';
                iframe.style.width = '0';
                iframe.style.height = '0';
                iframe.style.border = '0';
                iframe.setAttribute('aria-hidden', 'true');
                document.body.appendChild(iframe);

                const iframeDoc = iframe.contentWindow?.document;
                if (!iframeDoc) {
                    iframe.remove();
                    alert('Unable to open print preview in this browser.');
                    return;
                }

                iframeDoc.open();
                iframeDoc.write(docHtml);
                iframeDoc.close();

                const cleanup = () => setTimeout(() => iframe.remove(), 1500);
                const triggerIframePrint = () => {
                    iframe.contentWindow?.focus();
                    iframe.contentWindow?.print();
                    cleanup();
                };

                if (iframeDoc.readyState === 'complete') {
                    triggerIframePrint();
                } else {
                    iframe.onload = triggerIframePrint;
                }
            },
            printPlayerOnePager: (playerId = state.ui.selectedPlayerId) => {
                const player = state.players.find(p => p.id === playerId);
                if (!player) return;

                const details = generateExtendedPlayerMetadata(player, state.players);
                if (!details) return;

                const docHtml = buildPlayerOnePagerDocument(player, details);
                actions.openPrintDocument(docHtml);

        // --- NEW TEAM PULSE RENDERER (UPDATED) ---
        function renderTeamPulse(players) {
            if (!players || players.length === 0) return '';
           
            // 1. Calculate Team Averages
            const totalClutch = players.reduce((sum, p) => sum + (p.clutchFactor || 0), 0);
            const totalFit = players.reduce((sum, p) => sum + (p.fitScore || 0), 0);
            const avgClutch = Math.round(totalClutch / players.length);
            const avgFit = Math.round(totalFit / players.length);

            // 2. Identify Top and Bottom Positional Group
            const groups = [
                { name: "Pitchers & Catchers", positions: ['P', 'C'] },
                { name: "Infielders", positions: ['1B', '2B', '3B', 'SS'] },
                { name: "Outfielders", positions: ['LF', 'CF', 'RF'] }
            ];

            let bestGroup = null;
            let lowestGroup = null;
            let highestScore = -1;
            let lowestScore = Number.POSITIVE_INFINITY;

            groups.forEach(g => {
                const groupPlayers = players.filter(p => g.positions.includes(p.position));
                if (groupPlayers.length > 0) {
                    const gClutch = groupPlayers.reduce((sum, p) => sum + (p.clutchFactor || 0), 0) / groupPlayers.length;
                    const gFit = groupPlayers.reduce((sum, p) => sum + (p.fitScore || 0), 0) / groupPlayers.length;
                   
                    // Composite score to determine group performance (Clutch is ~750, Fit is ~75. Scale Fit by 10)
                    const composite = gClutch + (gFit * 10);
                   
                    if (composite > highestScore) {
                        highestScore = composite;
                        bestGroup = {
                            name: g.name,
                            avgClutch: Math.round(gClutch),
                            avgFit: Math.round(gFit),
                            count: groupPlayers.length
                        };
                    }

                    if (composite < lowestScore) {
                        lowestScore = composite;
                        lowestGroup = {
                            name: g.name,
                            avgClutch: Math.round(gClutch),
                            avgFit: Math.round(gFit),
                            count: groupPlayers.length
                        };
                    }
                }
            });

            // Fallback if no groups
            if (!bestGroup) bestGroup = { name: "N/A", avgClutch: 0, avgFit: 0, count: 0 };
            if (!lowestGroup) lowestGroup = { name: "N/A", avgClutch: 0, avgFit: 0, count: 0 };

            return `
            <div class="mb-5 animate-in">
                <div class="d-flex align-items-center justify-content-between mb-3 gap-3">

                        <div class="pulse-card h-100 d-flex flex-column justify-content-between">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div class="d-flex align-items-center gap-2">
                                    <div class="bg-light p-2 rounded-circle text-secondary">
                                        <i data-lucide="zap" width="18"></i>
                                    </div>
                                    <h6 class="fw-bold text-dark mb-0">Team Clutch</h6>
                                </div>
                            </div>
                            <div>
                                <span class="d-block text-dark fw-bold display-5 mb-0">${avgClutch}</span>
                                <span class="text-secondary small fw-bold text-uppercase" style="font-size: 0.65rem; letter-spacing: 0.05em">Roster Average</span>
                            </div>
                        </div>
                    </div>

                    <!-- Team Average Alignment -->
                    <div class="col-md-6 col-xl-3">
                         <div class="pulse-card h-100 d-flex flex-column justify-content-between">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div class="d-flex align-items-center gap-2">
                                    <div class="bg-light p-2 rounded-circle text-secondary">
                                        <i data-lucide="bar-chart-2" width="18"></i>
                                    </div>
                                    <h6 class="fw-bold text-dark mb-0">Team Alignment</h6>
                                </div>
                            </div>
                            <div>
                                <span class="d-block text-dark fw-bold display-5 mb-0">${avgFit}%</span>
                                <span class="text-secondary small fw-bold text-uppercase" style="font-size: 0.65rem; letter-spacing: 0.05em">Roster Average</span>
                            </div>
                        </div>
                    </div>

                    <!-- Top Group -->
                    <div class="col-md-6 col-xl-3">
                         <div class="pulse-card h-100 d-flex flex-column justify-content-between" style="border-left: 4px solid #16a34a;">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div class="d-flex align-items-center gap-2">
                                    <div class="bg-light p-2 rounded-circle text-secondary">
                                        <i data-lucide="trophy" width="18"></i>
                                    </div>
                                    <h6 class="fw-bold text-dark mb-0">Top Unit</h6>
                                </div>
                            </div>
                            <div>
                                <span class="d-block text-dark fw-bold h3 mb-1">${bestGroup.name}</span>

        function getYouTubeEmbedUrl(url = '') {
            if (!url) return '';

            const shortMatch = url.match(/youtu\.be\/([^?&#]+)/);
            if (shortMatch?.[1]) return `https://www.youtube.com/embed/${shortMatch[1]}`;
            const watchMatch = url.match(/[?&]v=([^&#]+)/);
            if (watchMatch?.[1]) return `https://www.youtube.com/embed/${watchMatch[1]}`;
            return '';
        }

        function normalizeCommitmentLabel(label) {
            return String(label ?? 'Uncommitted').trim().toLowerCase();
        }

        function getSharedRecruitIds() {
            const sharedRecruitStatuses = new Set(['signed', 'offered']);
            return new Set(
                (Array.isArray(state.invites) ? state.invites : [])
                    .filter(i => sharedRecruitStatuses.has(normalizeCommitmentLabel(i.commitmentLabel)) && !i.isArchived)
                    .map(i => i.id)
            );
        }

        function getRecruitCommitmentLabel(playerId) {
            const invite = (Array.isArray(state.invites) ? state.invites : []).find(i => i.id === playerId && !i.isArchived);
            const normalized = normalizeCommitmentLabel(invite?.commitmentLabel);
            if (normalized !== 'signed' && normalized !== 'offered') return '';
            return normalized.charAt(0).toUpperCase() + normalized.slice(1);
        }

        function renderCommitmentBadge(playerId, className = 'ms-2') {
            const label = getRecruitCommitmentLabel(playerId);
            if (!label) return '';
            const isSigned = label === 'Signed';
            const badgeStyle = isSigned
                ? 'background-color: #dcfce7; color: #166534; border: 1px solid #86efac;'
                : 'background-color: #ffedd5; color: #9a3412; border: 1px solid #fdba74;';
            return `<span class="badge rounded-pill fw-bold ${className}" style="font-size: 0.62rem; letter-spacing: 0.03em; ${badgeStyle}">${label}</span>`;
        }

        function getPerformanceTag(player) {
            if (!player) return null;
            // Top Profile = Alignment ≥ 62.5% • Clutch ≥ 750
            const isTopProfile = (player.fitScore ?? 0) >= 62.5 && (player.clutchFactor ?? 0) >= 750;
            // Fit Risk = Alignment < 62.5% • Clutch < 750
            const isFitRisk = (player.fitScore ?? 0) < 62.5 && (player.clutchFactor ?? 0) < 750;
            const isConditional = !isTopProfile && !isFitRisk;

            if (isTopProfile) return { label: 'Top Profile', style: 'background-color: #dcfce7; color: #166534; border: 1px solid #86efac;' };
            if (isFitRisk) return { label: 'At-Risk', style: 'background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5;' };
            if (isConditional) return { label: 'Conditional', style: 'background-color: #fef3c7; color: #92400e; border: 1px solid #fcd34d;' };
            return null;
        }

        function renderPerformanceBadge(player, className = 'ms-2') {
            const tag = getPerformanceTag(player);
            if (!tag) return '';
            return `<span class="badge rounded-pill fw-bold ${className}" style="font-size: 0.62rem; letter-spacing: 0.03em; ${tag.style}">${tag.label}</span>`;
        }

        function renderPerformanceSignifierGuide() {
            const signifiers = [
                {
                    label: 'Top Profile',
                    style: 'background-color: #dcfce7; color: #166534; border: 1px solid #86efac;',
                    rule: 'Alignment ≥ 62.5% and Clutch ≥ 750',

                {
                    label: 'Conditional',
                    style: 'background-color: #fef3c7; color: #92400e; border: 1px solid #fcd34d;',
                    rule: 'One metric is high while the other needs development',
                    guidance: 'Strong upside with targeted coaching. Pair role clarity with a defined development plan.'

                {
                    label: 'At-Risk',
                    style: 'background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5;',
                    rule: 'Alignment < 62.5% and Clutch < 750',
                    guidance: 'Higher friction and performance volatility. Increase communication cadence and accountability checkpoints.'

            return `<div class="alert alert-light border border-light-subtle mb-4" style="background-color: #f8fafc;"><div class="d-flex align-items-start gap-2 mb-3"><i data-lucide="badge-info" width="16" class="text-secondary mt-1"></i><div><p class="small fw-bold text-dark mb-1">Performance Signifier Key</p><p class="small text-secondary mb-0">These labels appear beside player names across the dashboard.</p></div></div><div class="signifier-grid">${signifiers.map(item => `<div class="signifier-card"><span class="badge rounded-pill fw-bold" style="font-size: 0.62rem; letter-spacing: 0.03em; ${item.style}">${item.label}</span><p class="signifier-rule mb-1">${item.rule}</p><p class="small text-dark mb-0" style="font-size: 0.78rem; line-height: 1.45;">${item.guidance}</p></div>`).join('')}</div></div>`;

        function formatDisplayName(player) {
            if (!player || !player.name) return '';
            const parts = player.name.split(',');

            return `${parts[1].trim()} ${parts[0].trim()}`;
        }

        function renderSortLabel(label, field) {
            if (state.sort.field !== field) return `${label} ↕`;
            return `${label} ${state.sort.direction === 'asc' ? '↑' : '↓'}`;
        }

        function renderRecruitingView() {
            let invites = Array.isArray(state.invites) ? state.invites : [];
            // 1. View Filter (Active vs Archived)
            if (state.ui.recruitingView === 'archived') {
                invites = invites.filter(i => i.isArchived);
            } else {
                invites = invites.filter(i => !i.isArchived);
               
                // 2. Secondary Filter (Commitment Labels)
                if (state.ui.recruitingFilter !== 'all') {
                    invites = invites.filter(i => normalizeCommitmentLabel(i.commitmentLabel) === state.ui.recruitingFilter);
                }
               
                // 3. Status Filter
                if (state.ui.recruitingStatus === 'completed') {
                    invites = invites.filter(i => i.status === 'Completed');
                } else {
                    invites = invites.filter(i => i.status !== 'Completed');
                }
            }
           
            // 4. Grad Year Filter
            if (state.filters.recruitingGradYear !== 'All') invites = invites.filter(i => String(i.graduationYear) === state.filters.recruitingGradYear);
           
            // 5. Search
            if (state.searchQuery) invites = invites.filter(i => i.name.toLowerCase().includes(state.searchQuery.toLowerCase()));

            // 6. Sorting
            invites.sort((a, b) => {
                const valA = a[state.sort.field];
                const valB = b[state.sort.field];
                if (valA === valB) return 0;
                return (valA < valB ? -1 : 1) * (state.sort.direction === 'asc' ? 1 : -1);
            });

            // Determine Page Title
            let pageTitle = 'Recruiting Pipeline';
            if (state.ui.recruitingView === 'archived') {
                pageTitle = 'Archived Database';

            return `

                                <button onclick="actions.setRecruitingFilter('offered')" class="${state.ui.recruitingFilter === 'offered' ? 'active' : ''}">Offered</button>
                                <button onclick="actions.setRecruitingFilter('uncommitted')" class="${state.ui.recruitingFilter === 'uncommitted' ? 'active' : ''}">Uncommitted</button>
                            </div>
                            <div class="vr opacity-25" style="height: 20px;"></div>
                            <!-- Status Toggle -->
                            <div class="toggle-switch">
                                <button onclick="actions.setRecruitingStatus('completed')" class="${state.ui.recruitingStatus === 'completed' ? 'active' : ''}">Completed</button>
                                <button onclick="actions.setRecruitingStatus('pending')" class="${state.ui.recruitingStatus === 'pending' ? 'active' : ''}">Pending</button>
                            </div>

        function renderActionMatrix(players) {
            const groups = {
                trust: { id: "Trust / Anchors", title: "Trust / Anchors", subtitle: "High Clutch / High Alignment • Alignment ≥ 62.5% • Clutch ≥ 750", color: "#16a34a", list: players.filter(p => p.fitScore >= 62.5 && p.clutchFactor >= 750) },
                highMaint: { id: "High Reward / High Maintenance", title: "High Reward / High Maintenance", subtitle: "High Clutch / Low Alignment • Alignment < 62.5% • Clutch ≥ 750", color: "#ea580c", list: players.filter(p => p.fitScore < 62.5 && p.clutchFactor >= 750) },
                culture: { id: "Culture Carriers", title: "Culture Carriers", subtitle: "Low Clutch / High Alignment • Alignment ≥ 62.5% • Clutch < 750", color: "#2563eb", list: players.filter(p => p.fitScore >= 62.5 && p.clutchFactor < 750) },
                risk: { id: "At Risk", title: "At Risk", subtitle: "Low Clutch / Low Alignment • Alignment < 62.5% • Clutch < 750", color: "#64748b", list: players.filter(p => p.fitScore < 62.5 && p.clutchFactor < 750) }
            };
            let activeGroups = Object.values(groups);
            if (state.filters.cohort !== 'All') activeGroups = activeGroups.filter(g => g.id === state.filters.cohort);
            const colClass = activeGroups.length === 1 ? 'col-12' : 'col-lg-3 col-md-6';
            return `<div class="row g-3 h-100">${activeGroups.map(group => `<div class="${colClass} mb-4"><div class="matrix-column h-100"><div class="matrix-header" style="border-color: ${group.color}"><div><h5 class="fw-bold text-uppercase mb-1" style="font-size: 0.75rem; color: ${group.color}">${group.title}</h5><span class="small text-secondary fw-bold" style="font-size: 0.65rem">${group.subtitle}</span></div><span class="badge rounded-pill fw-bold" style="background-color: ${group.color}">${group.list.length}</span></div><div class="custom-scrollbar" style="max-height: 600px; overflow-y: auto; padding-right: 4px;">${group.list.map(p => `<div class="player-card" onclick="actions.openPlayerModal('${p.id}', 'alignment')"><div class="d-flex justify-content-between align-items-start mb-2"><div><span class="d-block fw-bold text-dark small mb-1">${p.name}${renderPerformanceBadge(p)}${renderCommitmentBadge(p.id)}</span><span class="tag-pill bg-light text-secondary border">${p.position}</span></div><div class="text-end"><span class="d-block fw-bold text-dark h5 mb-0">${p.clutchFactor}</span><span class="small text-secondary" style="font-size: 0.6rem">CLUTCH</span></div></div><div class="d-flex align-items-center gap-2 mt-2 pt-2 border-top border-light"><div class="progress flex-grow-1" style="height: 4px;"><div class="progress-bar" role="progressbar" style="width: ${p.fitScore}%; background-color: ${group.color}" aria-valuenow="${p.fitScore}" aria-valuemin="0" aria-valuemax="100"></div></div><span class="small fw-bold" style="font-size: 0.7rem; color: ${group.color}">${p.fitScore}%</span></div></div>`).join('')}</div></div></div>`).join('')}</div>`;
        }

        function renderTable(playerList) {
            let processed = playerList ? [...playerList] : [...state.players];
            // Table filtering logic handled in main render now, just search and sort here
            if (state.searchQuery) processed = processed.filter(p => p.name.toLowerCase().includes(state.searchQuery.toLowerCase()));
            processed.sort((a, b) => { const valA = a[state.sort.field]; const valB = b[state.sort.field]; return (valA < valB ? -1 : 1) * (state.sort.direction === 'asc' ? 1 : -1); });

            // Determine Context for click action
            const clickContext = state.view === 'nterpret' ? 'nterpret' : 'default';

            if (state.view === 'nterpret') {
                 // Fallback for nterpret if renderNTerpretView fails or isn't used
                 return `<div class="bg-white rounded-3 shadow-sm p-4"><div class="table-responsive"><table class="table table-custom table-hover mb-0"><thead><tr><th onclick="actions.setSort('name')" class="cursor-pointer" style="width: 50%">Name</th><th style="width: 50%">Date Taken</th></tr></thead><tbody>${processed.map(p => `<tr onclick="actions.openPlayerModal('${p.id}', '${clickContext}')" class="cursor-pointer"><td><span class="nterpret-link fw-medium">${p.name}${renderPerformanceBadge(p)}${renderCommitmentBadge(p.id)}</span></td><td class="text-secondary">${p.dateTaken}</td></tr>`).join('')}</tbody></table></div></div>`;

                // TREND LOGIC REMOVED
               
                return `
                <tr onclick="actions.openPlayerModal('${p.id}', '${clickContext}')" class="cursor-pointer">
                    <td class="text-center" onclick="event.stopPropagation()">

                    <td>${p.position}</td>
                    <td>${p.round}</td>
                    <td>${p.graduationYear}</td>
                    <td>
                        <span class="fw-bold text-dark">${p.clutchFactor}</span>
                    </td>
                    <td>${p.fitScore ? p.fitScore + '%' : '-'}</td>
                </tr>`

        }

            const scoringRangeText = getScoringRangeText(player.clutchFactor);

        function renderComparisonModal() {

            const colClass = selectedPlayers.length === 2 ? 'col-6' : 'col-4';

        // --- MAIN RENDER ---
        function render() {
            window.render = render;
            try {
                // Focus preservation logic
                let focusedElementId = null;
                let cursorStart = 0;

    <script>
        // White-screen safety net: attempt self-heal, then show a diagnostic if app failed to boot.
        setTimeout(() => {
            const root = document.getElementById('root');
            if (!root) return;

            const hasPrimaryAppShell = () => Boolean(document.querySelector('.app-main') || document.querySelector('.app-header'));
            const isInitialLoaderOnly = () => {
                const text = (root.textContent || '').trim();
                return text.includes('Loading NTangible Baseball Dashboard');
            };

            // If the app shell is present, boot succeeded.
            if (hasPrimaryAppShell()) return;

            // If root is empty OR still stuck on initial loader, try recovery.
            const needsRecovery = root.children.length === 0 || isInitialLoaderOnly();
            if (!needsRecovery) return;

            // Self-heal path for merge scenarios where init lines were dropped.
            if (typeof window.render === 'function') {
                try {
                    window.render();
                } catch (e) {
                    window.__renderSafetyError = e;
                }
            }
            if (hasPrimaryAppShell()) return;

            const err = window.__renderSafetyError || window.__lastRenderError || null;
            const errText = err && err.stack ? err.stack : (err ? String(err) : 'No runtime error was captured. This is often caused by a bad merge or stale deployment cache.');

            root.innerHTML = `
                <div class="container py-5">
                    <div class="alert alert-danger" role="alert">
                        <h4 class="alert-heading mb-2">Rendering Error Detected</h4>
                        <p class="mb-2">The app did not render correctly after load.</p>
                        <p class="mb-2">Please hard refresh this page (Ctrl/Cmd + Shift + R). If the issue continues, redeploy after confirming conflict resolution preserved both code paths.</p>
                        <pre class="mb-0 mt-3" style="white-space: pre-wrap; font-size: 0.75rem;">${errText}</pre>
                    </div>
                </div>
            `;
        }, 2500);
    </script>
